<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cram Crew | Find Your Study Tribe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .step-content {
        display: none;
      }
      .step-content.active {
        display: block;
      }
    </style>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900">
    <nav class="p-6 bg-white shadow-sm flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">Cram Crew</h1>
      <span class="text-sm text-slate-500">Studying is better together.</span>
    </nav>

    <main class="max-w-2xl mx-auto mt-12 p-8 bg-white rounded-2xl shadow-xl">
      <div id="step1" class="step-content active">
        <h2 class="text-3xl font-bold mb-2">Welcome to the Crew!</h2>
        <p class="text-slate-600 mb-8">Let's start with the basics.</p>

        <div class="space-y-4">
          <div>
            <label class="block font-medium mb-1">Full Name</label>
            <input
              type="text"
              id="userName"
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
              placeholder="Alex Smith"
            />
          </div>
          <div>
            <label class="block font-medium mb-1">Major</label>
            <input
              type="text"
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
              placeholder="Computer Science"
            />
          </div>
          <button
            onclick="nextStep(2)"
            class="w-full bg-indigo-600 text-white py-4 rounded-lg font-bold hover:bg-indigo-700 transition"
          >
            Get Started
          </button>
        </div>
      </div>

      <div id="step2" class="step-content">
        <h2 class="text-3xl font-bold mb-2">Your Study Style</h2>
        <p class="text-slate-600 mb-8">How and when do you work best?</p>

        <div class="space-y-6">
          <div>
            <label class="block font-medium mb-2"
              >Subject you need help with:</label
            >
            <select id="subject" class="w-full p-3 border rounded-lg bg-white">
              <option>Calculus III</option>
              <option>Organic Chemistry</option>
              <option>Macroeconomics</option>
              <option>Intro to Psychology</option>
            </select>
          </div>

          <div>
            <label class="block font-medium mb-2">Preferred Vibe:</label>
            <div class="grid grid-cols-2 gap-3">
              <button
                class="style-btn border p-3 rounded-lg hover:bg-indigo-50"
                onclick="selectStyle(this, 'Quiet')"
              >
                Silent Focus
              </button>
              <button
                class="style-btn border p-3 rounded-lg hover:bg-indigo-50"
                onclick="selectStyle(this, 'Collaborative')"
              >
                Active Discussion
              </button>
            </div>
          </div>

          <div class="flex gap-4">
            <button
              onclick="nextStep(1)"
              class="w-1/3 text-slate-500 font-medium"
            >
              Back
            </button>
            <button
              onclick="showMatches()"
              class="w-2/3 bg-indigo-600 text-white py-4 rounded-lg font-bold hover:bg-indigo-700 transition"
            >
              Find Partners
            </button>
          </div>
        </div>
      </div>

      <div id="step3" class="step-content">
        <h2 class="text-3xl font-bold mb-2">Your Crew Matches</h2>
        <p class="text-slate-600 mb-8">
          We found these students matching your style:
        </p>

        <div id="matchList" class="space-y-4"></div>

        <button
          onclick="location.reload()"
          class="mt-8 text-indigo-600 font-medium w-full text-center"
        >
          Start Over
        </button>
      </div>
    </main>

    <script>
      let userData = { name: "", style: "" };

      function nextStep(step) {
        document
          .querySelectorAll(".step-content")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById("step" + step).classList.add("active");
        userData.name = document.getElementById("userName").value;
      }

      function selectStyle(btn, style) {
        document
          .querySelectorAll(".style-btn")
          .forEach((b) =>
            b.classList.remove("bg-indigo-100", "border-indigo-500")
          );
        btn.classList.add("bg-indigo-100", "border-indigo-500");
        userData.style = style;
      }

      function showMatches() {
        const subject = document.getElementById("subject").value;
        const list = document.getElementById("matchList");
        const potentialMatches = [
          {
            name: "Jordan M.",
            bio: "Loves coffee and solving equations.",
            match: "98%",
          },
          {
            name: "Sarah L.",
            bio: "Flashcard enthusiast. Let's quiz each other!",
            match: "85%",
          },
        ];

        list.innerHTML = potentialMatches
          .map(
            (m) => `
                <div class="flex items-center justify-between p-4 border rounded-xl hover:shadow-md transition">
                    <div>
                        <h4 class="font-bold text-lg">${m.name}</h4>
                        <p class="text-sm text-slate-500">${m.bio}</p>
                        <span class="text-xs font-bold uppercase text-indigo-500">${subject}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-green-500 font-bold">${m.match} Match</div>
                        <button class="mt-2 bg-slate-900 text-white px-4 py-1 rounded-md text-sm">Chat</button>
                    </div>
                </div>
            `
          )
          .join("");

        nextStep(3);
      }
    </script>
  </body>
</html>
